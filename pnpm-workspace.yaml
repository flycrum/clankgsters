packages:
  - packages/*
  - configs/*

catalog:
  '@types/lodash-es': ^4.17.12
  '@types/mdast': ^4.0.4
  '@types/node': ^24
  chalk: ^5.6.2
  lodash-es: ^4.17.23
  mdast-util-to-string: ^4.0.0
  neverthrow: ^8.2.0
  oxlint: 1.56.0
  pino: ^10.3.1
  remark-frontmatter: ^5.0.0
  remark-parse: ^11.0.0
  remark-stringify: ^11.0.0
  type-fest: ^5.5.0
  typescript: ^5
  unified: ^11.0.5
  unist-util-visit: ^5.1.0
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  xstate: ^5.28.0
  zod: ^4.3.6

catalogMode: prefer
overrides:
  vite: 'catalog:'
  vitest: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: '*'
    vitest: '*'
