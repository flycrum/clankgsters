name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Lint, format, types
        run: vp check

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '22'
          cache: true

      - name: Install dependencies
        run: vp install

      - name: Build sync package and run workspace tests
        run: vp run @clankgster/sync#build && vp run -r test

      - name: Sync e2e harness (sandbox + manifest)
        # Use vp run — setup-vp does not put `pnpm` on PATH (unlike local shells with Corepack/pnpm)
        run: vp run @clankgster/sync-e2e#e2e-tests:run
